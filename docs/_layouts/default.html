<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} - {{ site.title }}</title>
    
    <!-- Tailwind (CDN + Typography) -->
    <script>
        tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                50: '#eff6ff',
                                100: '#dbeafe',
                                500: '#2563eb',
                                700: '#1d4ed8'
                            }
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <!-- CSS personnalisé -->
    <link rel="stylesheet" href="{{ '/assets/css/page.css' | relative_url }}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-properties.min.js"></script>
    <link rel="icon" type="image/x-icon" href="{{ '/assets/images/avatar.ico' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/avatar.png' | relative_url }}">
</head>
<body class="min-h-screen flex flex-col">

<!-- Navbar horizontale -->
<nav class="w-full bg-white/70 backdrop-blur border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-[1400px] mx-auto px-6 py-4 flex items-center gap-3">
        <a class="flex items-center gap-3 text-slate-900 font-semibold tracking-tight" href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/images/avatar.jpg' | relative_url }}" class="avatar" alt="Avatar">
            <span class="text-lg">{{ site.title }}</span>
        </a>
    </div>
</nav>

<!-- Corps de la page avec sidebar verticale + contenu -->
<main class="flex-1 max-w-[1400px] mx-auto w-full px-6 py-6 grid grid-cols-1 lg:grid-cols-[300px_1fr] gap-6">
    {% include sidebar.html %}
    <div class="content-area prose prose-slate max-w-none">
        {% if page.tags %}
        <div class="not-prose">
            {% include tags.html %}
        </div>
        {% endif %}
        {% if page.music %}
        <div class="not-prose">
            <iframe class="music my-6" src="{{ page.music }}" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        {% endif %}
        {{ content }}
    </div>
</main>

<div class="max-w-[1400px] mx-auto w-full px-6 pb-10">
    {% include footer.html %}
</div>

<script>
    window.__BASEURL__ = {{ '' | relative_url | jsonify }};
</script>
<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>

</body>
</html>
